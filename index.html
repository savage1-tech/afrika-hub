<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFRIKA HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gold { color: #D4AF37; }
        .premium-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212,175,55,0.2);
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen">
    <!-- Login Screen -->
    <div id="login-screen" class="flex flex-col min-h-screen">
        <div class="flex-1 flex items-center justify-center p-6">
            <div class="w-full max-w-md">
                <!-- Logo -->
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-24 h-24 bg-gradient-to-br from-yellow-400 to-amber-600 rounded-2xl mb-6 shadow-2xl">
                        <span class="text-6xl">🌍</span>
                    </div>
                    <h1 class="text-5xl font-bold tracking-tighter gold">AFRIKA HUB</h1>
                    <p class="text-gray-400 mt-2">Africa's Trusted Escrow Marketplace</p>
                </div>

                <div class="premium-card rounded-3xl p-8 shadow-2xl">
                    <h2 class="text-2xl font-semibold mb-6 text-center">Sign In</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Phone or Email</label>
                            <input id="login-input" type="text" placeholder="+234 801 234 5678" 
                                   class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400 text-lg">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Password / OTP</label>
                            <input id="password-input" type="password" placeholder="••••••••" 
                                   class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400 text-lg">
                        </div>
                    </div>

                    <button onclick="handleLogin()" 
                            class="mt-8 w-full bg-gradient-to-r from-yellow-400 to-amber-600 text-black font-semibold py-4 rounded-2xl text-lg active:scale-95 transition-all">
                        Continue Securely
                    </button>

                    <div class="flex items-center justify-center gap-3 my-6">
                        <div class="h-px bg-zinc-700 flex-1"></div>
                        <span class="text-gray-500 text-sm">OR</span>
                        <div class="h-px bg-zinc-700 flex-1"></div>
                    </div>

                    <button onclick="googleLogin()" 
                            class="w-full border border-zinc-700 hover:border-yellow-400 py-4 rounded-2xl flex items-center justify-center gap-3 transition-all">
                        <i class="fa-brands fa-google"></i> Continue with Google
                    </button>
                </div>

                <p class="text-center text-gray-500 mt-8 text-sm">
                    Don't have an account? <span onclick="switchToSignup()" class="gold cursor-pointer">Create one</span>
                </p>
            </div>
        </div>
    </div>

    <!-- Main App (hidden initially) -->
    <div id="main-app" class="hidden flex flex-col min-h-screen">
        <!-- Header -->
        <header class="bg-zinc-950 border-b border-yellow-900 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🌍</span>
                <div>
                    <h1 class="text-2xl font-bold gold tracking-tighter">AFRIKA HUB</h1>
                </div>
            </div>
            <div onclick="logout()" class="text-yellow-400 cursor-pointer">
                <i class="fa-solid fa-right-from-bracket"></i>
            </div>
        </header>

        <!-- Rest of the app content here -->
        <div class="p-6">
            <h2 class="text-2xl font-semibold mb-4">Welcome back!</h2>
            <p class="text-gray-400">Marketplace, Escrow & AI Assistant ready.</p>
            <!-- Add more content as needed -->
        </div>
    </div>

    <script>
        function handleLogin() {
            const input = document.getElementById('login-input').value.trim();
            if (input.length > 5) {
                localStorage.setItem('afrikaHubLoggedIn', 'true');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                alert('✅ Logged in securely! Welcome to AFRIKA HUB');
            } else {
                alert('Please enter your phone or email');
            }
        }

        function googleLogin() {
            alert('🔐 Google login simulated - Welcome to AFRIKA HUB');
            localStorage.setItem('afrikaHubLoggedIn', 'true');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }

        function switchToSignup() {
            alert('Signup flow coming soon - Premium experience in progress');
        }

        function logout() {
            if (confirm('Logout?')) {
                localStorage.removeItem('afrikaHubLoggedIn');
                location.reload();
            }
        }

        // Auto check login
        window.onload = () => {
            if (localStorage.getItem('afrikaHubLoggedIn') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
