<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFRIKA HUB - Secure Escrow Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        .nav-item { transition: all 0.2s; }
        .nav-item.active { color: #22c55e; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <!-- HEADER -->
    <header class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-green-500 rounded-2xl flex items-center justify-center text-2xl">🌍</div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tighter">AFRIKA HUB</h1>
                    <p class="text-xs text-zinc-500 -mt-1">Escrow • Secure • African</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div onclick="toggleAI()" class="w-10 h-10 bg-zinc-900 hover:bg-zinc-800 rounded-2xl flex items-center justify-center cursor-pointer">
                    <i class="fa-solid fa-robot text-green-400"></i>
                </div>
                <div class="flex items-center bg-zinc-900 rounded-3xl px-4 py-2 text-sm">
                    <i class="fa-solid fa-wallet mr-2"></i>
                    <span class="font-medium">₦45,820</span>
                </div>
            </div>
        </div>
    </header>

    <!-- HERO -->
    <div class="bg-gradient-to-br from-green-900/50 to-black py-16">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h2 class="text-5xl font-bold mb-4">Buy & Sell Safely Across Africa</h2>
            <p class="text-xl text-zinc-400 mb-8 max-w-md mx-auto">Escrow protection. AI assistance. Trusted by thousands.</p>
            <div class="flex justify-center gap-4">
                <button onclick="showShop()" class="bg-green-500 hover:bg-green-600 px-8 py-4 rounded-3xl font-semibold text-lg">Shop Now</button>
                <button onclick="startSelling()" class="border border-white/50 hover:bg-white/10 px-8 py-4 rounded-3xl font-semibold text-lg">Start Selling</button>
            </div>
        </div>
    </div>

    <!-- MARKETPLACE -->
    <div id="shop-section" class="max-w-7xl mx-auto px-4 py-8">
        <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3">
            <i class="fa-solid fa-store"></i> Trending in Africa
        </h3>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="products">
            <!-- Products populated by JS -->
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-zinc-800 md:hidden">
        <div class="flex justify-around py-3">
            <a href="#" onclick="navigate(0)" class="nav-item active flex flex-col items-center text-xs"><i class="fa-solid fa-house text-2xl"></i><span>Home</span></a>
            <a href="#" onclick="navigate(1)" class="nav-item flex flex-col items-center text-xs"><i class="fa-solid fa-store text-2xl"></i><span>Shop</span></a>
            <a href="#" onclick="navigate(2)" class="nav-item flex flex-col items-center text-xs"><i class="fa-solid fa-plus text-3xl -mt-2 text-green-500"></i></a>
            <a href="#" onclick="navigate(3)" class="nav-item flex flex-col items-center text-xs"><i class="fa-solid fa-shield-halved text-2xl"></i><span>Escrow</span></a>
            <a href="#" onclick="navigate(4)" class="nav-item flex flex-col items-center text-xs"><i class="fa-solid fa-user text-2xl"></i><span>Me</span></a>
        </div>
    </nav>

    <!-- AI CHAT -->
    <div id="ai-chat" class="hidden fixed bottom-20 right-4 w-80 bg-zinc-900 rounded-3xl shadow-2xl border border-green-500/30 overflow-hidden z-50">
        <div class="bg-zinc-800 p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-robot text-green-400"></i>
                <div>
                    <p class="font-semibold">AfriAI Assistant</p>
                    <p class="text-xs text-green-400">Online • Helps with escrow</p>
                </div>
            </div>
            <button onclick="toggleAI()" class="text-zinc-400 hover:text-white">✕</button>
        </div>
        <div id="chat-messages" class="h-80 p-4 overflow-y-auto text-sm space-y-4 bg-zinc-950"></div>
        <div class="p-4 border-t border-zinc-800">
            <div class="flex gap-2">
                <input id="chat-input" type="text" placeholder="Ask about products, escrow..." class="flex-1 bg-zinc-800 rounded-2xl px-5 py-3 focus:outline-none">
                <button onclick="sendMessage()" class="bg-green-500 px-6 rounded-2xl">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Sample products
        const products = [
            { id: 1, name: "Handwoven Aso Oke Fabric", price: "₦28,500", location: "Lagos, NG", img: "https://picsum.photos/id/1015/400/300" },
            { id: 2, name: "Pure Honey from Kenya", price: "₦12,800", location: "Nairobi, KE", img: "https://picsum.photos/id/106/400/300" },
            { id: 3, name: "Ankara Print Dress", price: "₦18,900", location: "Accra, GH", img: "https://picsum.photos/id/201/400/300" },
            { id: 4, name: "Leather Bag - Senegal", price: "₦45,200", location: "Dakar, SN", img: "https://picsum.photos/id/251/400/300" }
        ];

        function renderProducts() {
            const container = document.getElementById('products');
            container.innerHTML = products.map(p => `
                <div class="product-card bg-zinc-900 rounded-3xl overflow-hidden">
                    <img src="${p.img}" class="w-full h-48 object-cover">
                    <div class="p-4">
                        <p class="font-semibold">${p.name}</p>
                        <p class="text-green-400 text-lg font-bold mt-1">${p.price}</p>
                        <p class="text-xs text-zinc-500">${p.location}</p>
                        <button onclick="buyWithEscrow(${p.id})" class="mt-4 w-full bg-green-600 hover:bg-green-500 py-3 rounded-2xl text-sm font-semibold">Buy with Escrow</button>
                    </div>
                </div>
            `).join('');
        }

        function buyWithEscrow(id) {
            alert(`✅ Escrow order started for product #${id}!\n\nFunds held safely until you confirm delivery.`);
        }

        function toggleAI() {
            const chat = document.getElementById('ai-chat');
            chat.classList.toggle('hidden');
            if (!chat.classList.contains('hidden')) {
                addMessage('bot', 'Hello! How can I help you today with shopping or escrow?');
            }
        }

        function addMessage(sender, text) {
            const messages = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = sender === 'bot' ? 'text-left' : 'text-right';
            div.innerHTML = `<div class="inline-block max-w-[80%] px-4 py-3 rounded-3xl ${sender === 'bot' ? 'bg-zinc-800' : 'bg-green-600'}">${text}</div>`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            addMessage('user', input.value);
            const query = input.value.toLowerCase();
            input.value = '';
            setTimeout(() => {
                let reply = 'Great question! ';
                if (query.includes('escrow')) reply = 'Escrow holds your money until delivery is confirmed. 100% safe.';
                else if (query.includes('delivery')) reply = 'Average delivery: 3-7 days within Africa.';
                addMessage('bot', reply);
            }, 600);
        }

        function showShop() { document.getElementById('shop-section').scrollIntoView({ behavior: 'smooth' }); }
        function startSelling() { alert('Seller dashboard coming soon! List your products securely.'); }
        function navigate(n) { alert('Navigation ' + n + ' – full app coming soon!'); }

        // Init
        window.onload = renderProducts;
    </script>
</body>
</html>
